<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZingLots – Live Auction Platform</title>
    <meta
      name="description"
      content="Zinglots: The premier live auction platform for buyers and sellers. Real-time bidding, secure payments, and transparent transactions."
    />
    <meta name="author" content="ZingLots" />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- PWA + Icons -->
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <meta name="theme-color" content="#ffffff" />

    <!-- SEO: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Zinglots",
        "url": "https://www.zinglots.com",
        "logo": "https://www.zinglots.com/icons/social-512.png"
      }
    </script>

    <!-- SEO: WebSite w/ SearchAction -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://www.zinglots.com",
        "name": "Zinglots",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.zinglots.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
