<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZingLots - Live Auction Platform</title>
    <meta name="description" content="ZingLots - The premier live auction platform for buyers and sellers. Real-time bidding, secure payments, and transparent transactions." />
    <meta name="author" content="ZingLots" />

    <!-- Content Security Policy for enhanced security -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.paypal.com https://*.paypal.com;
                   connect-src 'self' ws: wss: https://*.supabase.co https://api.stripe.com https://api-m.paypal.com https://api-m.sandbox.paypal.com;
                   img-src 'self' data: blob:;
                   style-src 'self' 'unsafe-inline';
                   font-src 'self' data:;
                   frame-src https://js.stripe.com https://www.paypal.com https://*.paypal.com;">

    <meta property="og:title" content="ZingLots - Live Auction Platform" />
    <meta property="og:description" content="The premier live auction platform for buyers and sellers. Real-time bidding, secure payments, and transparent transactions." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@zinglots" />
    <meta name="twitter:title" content="ZingLots - Live Auction Platform" />
    <meta name="twitter:description" content="The premier live auction platform for buyers and sellers. Real-time bidding, secure payments, and transparent transactions." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"Organization",
      "name":"ZingLots",
      "url":"https://www.zinglots.com",
      "logo":"https://www.zinglots.com/og-logo.png"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"WebSite",
      "url":"https://www.zinglots.com",
      "name":"ZingLots",
      "potentialAction":{
        "@type":"SearchAction",
        "target":"https://www.zinglots.com/search?q={search_term_string}",
        "query-input":"required name=search_term_string"
      }
    }
    </script>

    <!-- Favicons and manifest -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
