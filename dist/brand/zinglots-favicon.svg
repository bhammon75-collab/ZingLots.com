<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Z favicon in red circle">
  <style>
    .red{fill:#DC2626}
    .z{fill:#FFFFFF;font:800 86px/1 'Inter','Manrope',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial}
  </style>
  <!-- Red circle -->
